name: Live ranking

# Runs the pipeline against the real Overpass + Census APIs on a GitHub-hosted
# runner (which has outbound internet), then commits the ranking back to the
# branch and uploads it as an artifact. Trigger manually from the Actions tab
# or via the API (workflow_dispatch).
#
# A CENSUS_API_KEY repo secret is optional but recommended; without it the
# Census API still works for modest volumes.

on:
  # Pushing the branch runs the live pipeline (the dev sandbox can't reach the
  # APIs, but GitHub runners can). paths-ignore + [skip ci] stop the workflow's
  # own results commit from re-triggering it.
  push:
    branches: ["claude/live-run-via-actions"]
    paths-ignore:
      - "results/**"
  workflow_dispatch:
    inputs:
      states:
        description: "Comma-separated USPS state codes to include"
        required: true
        default: "CT,NY,NJ,PA,MA,RI,NH,VT,ME,MD,AZ,OR,CA,IL,OH,MI,WA,CO,MN,WI"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run live pipeline (Overpass + Census)
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          STATES="${{ github.event.inputs.states }}"
          STATES="${STATES:-CT,NY,NJ,PA,MA,RI,NH,VT,ME,MD,AZ,OR,CA,IL,OH,MI,WA,CO,MN,WI}"
          echo "Running states: $STATES"
          wcpizza run --source live --states "$STATES"

      - name: Collect results
        run: |
          mkdir -p results
          cp data/processed/restaurants.csv results/restaurants.csv
          cp data/processed/map.html        results/map.html
          cp data/processed/summary.json    results/summary.json
          cp data/processed/ranking.csv     results/ranking.csv || true
          echo "----- restaurants: $(($(wc -l < results/restaurants.csv) - 1)) -----"
          echo "----- TOP CITIES (empty if no Census key) -----"
          head -n 21 results/ranking.csv || true

      - name: Commit results to branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f results/restaurants.csv results/map.html results/summary.json results/ranking.csv
          git commit -m "Live results: pizzeria map + ranking [skip ci]" || echo "no changes to commit"
          git push origin HEAD:${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: live-results
          path: results/
